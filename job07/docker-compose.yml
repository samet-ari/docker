services:
  nginx:
    image: nginx:latest
    ports:
      - "8080:80"
    volumes:
      - webdata:/usr/share/nginx/html

  ftp:
    image: delfer/alpine-ftp-server
    ports:
      - "21:21"
      - "21000-21010:21000-21010"
    volumes:
      - webdata:/ftp/user
    environment:
      - USERS=user|Docker@2024
      - ADDRESS=192.168.81.154

volumes:
  webdata:
