services:
  registry:
    image: registry:2
    ports:
      - "5000:5000"
    volumes:
      - registry_data:/var/lib/registry

  ui:
    image: joxit/docker-registry-ui:latest
    ports:
      - "8082:80"
    environment:
      - SINGLE_REGISTRY=true
      - REGISTRY_TITLE=Mon Registry Local
      - NGINX_PROXY_PASS_URL=http://registry:5000
    depends_on:
      - registry

volumes:
  registry_data:
